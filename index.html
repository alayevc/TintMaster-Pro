<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TintMaster Pro</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="topbar">

    <div>

        <div class="logo">
            🎨 TintMaster Pro
        </div>

        <div class="subtitle">
            Professional Paint Tinting System
        </div>

    </div>

    <div class="version">

        Version 1.0

    </div>
</header>

<section class="stats">

    <div class="stat-card">

        <h2>42</h2>

        <p>Colours</p>

    </div>

    <div class="stat-card">

        <h2>9</h2>

        <p>Families</p>

    </div>

    <div class="stat-card">

        <h2>✓</h2>

        <p>Auto Save</p>

    </div>

</section>

    <main class="container">

        <section class="hero">

            <h1>Paint Tinting System</h1>

            <p>
                Search colours and view their mixing formulas.
            </p>

        </section>

        <section class="search-area">

    <input
        type="text"
        id="search"
        placeholder="Search colour..."
    >

    <button id="exportBtn" class="export-btn">
        📤 Export Database
    </button>

</section>

        <section id="colourGrid" class="colour-grid">

            <!-- Colour cards appear here -->

        </section>

    </main>

    <script src="js/calculator.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/backup.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
